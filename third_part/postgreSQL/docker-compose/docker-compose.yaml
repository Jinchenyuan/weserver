version: "3.8"
services:
  postgres:
    image: postgres:15.4
    container_name: pg_local
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: land_contract
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data    # 持久化数据到当前目录 ./pgdata
      - ./initdb:/docker-entrypoint-initdb.d # 可选：放 init SQL 脚本，第一次启动时会自动执行
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5