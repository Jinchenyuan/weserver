syntax = "proto3";

package pb;
option go_package = "server/gen/pb;pb";

service Account {
    rpc Login(AccountLoginReq) returns (AccountLoginResp);
}

message AccountLoginReq {
    string username = 1;
    string password = 2;
}

message AccountLoginResp {
    int32 code = 1;
    string token = 2;
    string message = 3;
}